# ==============================================================================
# 로컬 개발 전용 Docker Compose
# DB, Redis, Web(Django), Celery Worker를 컨테이너로 실행합니다.
#
# 실행:  podman-compose -f docker-compose.local.yml up -d
# 중지:  podman-compose -f docker-compose.local.yml down
# 데이터 초기화: podman-compose -f docker-compose.local.yml down -v
# ==============================================================================
version: "3.9"
name: cascadingdemo_local

services:
  # 1. Database (PostgreSQL)
  db:
    image: postgres:14
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-cascading_db}
      POSTGRES_USER: ${DB_USER:-cascading_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-cascading_password}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 2. Redis (Celery 브로커 + 결과 백엔드)
  redis:
    image: redis:7-alpine
    restart: unless-stopped

  # 3. Web Server (Django runserver — 로컬 개발용)
  web:
    build: .
    restart: unless-stopped
    command: bash /app/scripts/local_entrypoint.sh
    environment:
      - APP_ENV=local
      # DB는 컨테이너 서비스명으로 연결
      - DB_HOST=db
      - REDIS_HOST=redis
      # 로컬 개발에서는 외부 엔진/API 대신 DB 스냅샷 + 가짜 엔진 사용
      - API_URL=
      - SIMULATION_ENGINE_API_URL=
      - SCENARIO_DATA_API_URL=
      - RUN_MIGRATIONS_ON_START=1
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    env_file:
      - .env.local
    ports:
      - "8000:8000"       # 호스트 8000 → 컨테이너 8000
    volumes:
      - .:/app             # 소스 코드 실시간 반영 (hot-reload)

  # 4. Celery Worker (비동기 작업 처리)
  worker:
    build: .
    restart: unless-stopped
    command: bash /app/scripts/worker_entrypoint.sh
    environment:
      - APP_ENV=local
      - DB_HOST=db
      - REDIS_HOST=redis
      # worker도 동일하게 가짜 엔진 경로를 사용
      - API_URL=
      - SIMULATION_ENGINE_API_URL=
      - SCENARIO_DATA_API_URL=
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    env_file:
      - .env.local
    volumes:
      - .:/app

volumes:
  postgres_data:

