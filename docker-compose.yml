version: "3.9"

services:
  # 1. Database
  db:
    image: postgres:14
    container_name: cascading_db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5433:5432" # 서버 배포: 호스트 5433 → 컨테이너 5432 (로컬 DB와 충돌 방지)
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 2. Redis - 메시지 브로커
  redis:
    image: redis:7-alpine
    container_name: cascading_redis
    ports:
      - "6379:6379"

  # 3. Web Server (Django + Gunicorn)
  web:
    build: .
    container_name: cascading_web
    command: /app/scripts/entrypoint.sh
    # local -> command: python manage.py runserver 0.0.0.0:8000
    environment:
      - APP_ENV=docker
    env_file:
      - .env.docker
#    local이면 ports, Nginx를 이면 expose
#    ports:
#      - "8000:8000"
    # [변경] 호스트 포트 매핑 제거 (Nginx를 통해서만 접근) -> expose로 내부 통신만 허용
    expose:
      - "8000"
    volumes:
      - .:/app             # 내 컴퓨터 현재 폴더(.)를 컨테이너의 /app 폴더로 연결
#     Nginx와 사용 시 추가
      - static_volume:/app/staticfiles  # Nginx와 공유할 정적 파일 볼륨
      - media_volume:/app/media         # Nginx와 공유할 미디어 파일 볼륨
    depends_on:
      - db
      - redis  # Redis가 켜진 뒤에 실행되도록 추가

  # 4. Celery Worker (신규 추가) - 비동기 작업 처리
  worker:
    build: .  # Web과 동일한 이미지를 사용 (코드 공유)
    container_name: cascading_worker
    # 리눅스 컨테이너 내부이므로 --pool 옵션 없이 실행해도 됩니다.
    #command: celery -A config worker -l info
    command: celery -A config worker -l info --concurrency=${CELERY_WORKER_CONCURRENCY:-2}
    environment:
      - APP_ENV=docker
    env_file:
      - .env.docker
    volumes:
      - .:/app             # Worker도 코드를 공유해야 함
    depends_on:
      - db
      - redis

  # 5. Nginx (신규 추가) - 리버스 프록시
  nginx:
    image: nginx:1.25-alpine
    restart: always
    ports:
      - "80:80"  # HTTP (리다이렉트용), 웹 브라우저는 80번 포트로 접근, 빌드 실패 시 8080 포트로 변경
      - "443:443" # HTTPS (보안 접속용 메인)
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro   # [추가] 인증서 폴더 마운트
      - static_volume:/app/staticfiles  # Django가 모은 정적 파일을 읽음
      - media_volume:/app/media         # 업로드된 미디어 파일을 읽음
    depends_on:
      - web

# 볼륨 정의
volumes:
  postgres_data:
  static_volume:  # Web과 Nginx가 공유
  media_volume:   # Web과 Nginx가 공유